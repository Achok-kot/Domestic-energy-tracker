name: EnergyIQ CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── Job 1: Test & Lint ──────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for secrets accidentally committed
        run: |
          if grep -rn "EIA_API_KEY\s*=\s*[a-zA-Z0-9]" --include="*.js" --include="*.html" .; then
            echo "ERROR: Possible hardcoded API key found in source files!"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Verify required files exist
        run: |
          for f in server.js package.json Dockerfile docker-compose.yml .env.example; do
            [ -f "$f" ] && echo "$f OK" || (echo "MISSING: $f" && exit 1)
          done

      - name: Verify .env is gitignored
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked by git! Remove it immediately."
            exit 1
          fi
          echo ".env is properly gitignored."

  # ─── Job 2: Build Docker image ───────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push - verifies Dockerfile is valid)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: energyiq:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to Web01 & Web02 ─────────────────────────────────────────
  deploy:
    name: Deploy to Servers
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Web01
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WEB01_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/energyiq
            git pull origin main
            npm ci --only=production
            pm2 restart energyiq || pm2 start server.js --name energyiq
            pm2 save
            echo "Web01 deployment complete"

      - name: Deploy to Web02
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WEB02_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/energyiq
            git pull origin main
            npm ci --only=production
            pm2 restart energyiq || pm2 start server.js --name energyiq
            pm2 save
            echo "Web02 deployment complete"

      - name: Verify deployments are healthy
        run: |
          sleep 5
          curl -f http://${{ secrets.WEB01_HOST }}/health && echo "Web01 healthy"
          curl -f http://${{ secrets.WEB02_HOST }}/health && echo "Web02 healthy"
